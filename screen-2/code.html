<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4caeaa",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d1d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>WasteTracker AI - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary/10">
<div class="relative h-48 w-full overflow-hidden">
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<div class="w-full h-full bg-center bg-cover opacity-80" data-alt="Abstract green leaves and recycled textures pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCkhAVY1dfUkmB7HjrfN6SGhqz5jZDF8ykfSgn6VamfYSghpi1jotu6MEFwmHJewvjESYIhIWS3nAYwHrRX9iBYOuRpyq9euWvCTc-0vdBNer3WqSb6UYeIoH7Ng8mT2lXuhcQIm3VDxJfdj11n3M2KXa_dgTkIsv6oAN1UwZnT2hTTLHLMd18Se3sOnDpbIzAzOuzPBrTzpiUu4oJFiWJG7Fzzdh-VAAga0HIfQLjypOfaPcn9s2XbgtSzs9HwWs-l3LhLDrU0lA')">
</div>
<div class="absolute inset-0 bg-gradient-to-t from-white dark:from-slate-900 via-transparent to-transparent"></div>
</div>
<div class="absolute bottom-4 left-0 right-0 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary text-white mb-2 shadow-lg">
<span class="material-symbols-outlined text-3xl">recycling</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">WasteTracker AI</h1>
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">Track your impact for a greener planet</p>
</div>
</div>
<div class="px-8 pb-10 pt-4">
<form action="#" class="space-y-5">
<div>
<label class="block mb-1.5 text-slate-700 dark:text-slate-300 text-sm font-semibold">Email</label>
<div class="relative">
<input class="w-full rounded-lg border border-primary/20 bg-background-light dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 h-12 px-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="name@example.com" type="email"/>
</div>
</div>
<div>
<label class="block mb-1.5 text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<div class="relative flex items-center">
<input class="w-full rounded-lg border border-primary/20 bg-background-light dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 h-12 px-4 pr-12 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="text-right mt-1.5">
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-md shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
<div class="relative py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-primary/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-400 font-medium">Or continue with</span>
</div>
</div>
<button class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-primary/20 text-slate-700 dark:text-slate-200 font-semibold py-3 rounded-lg hover:bg-background-light dark:hover:bg-slate-700 transition-colors" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Google Account
                </button>
</form>
<div class="mt-8 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create account</a>
</p>
</div>
</div>
<div class="bg-primary/5 dark:bg-primary/10 py-4 px-8 border-t border-primary/10 text-center">
<div class="flex items-center justify-center gap-4">
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-lg">12k+</span>
<span class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-bold">Active Users</span>
</div>
<div class="w-px h-8 bg-primary/20"></div>
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-lg">50t</span>
<span class="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-bold">Waste Saved</span>
</div>
</div>
</div>
</div>
</body></html>
